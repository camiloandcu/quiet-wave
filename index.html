<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Real-time Audio Monitor</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <main class="container">
        <header>
            <h1>Real-time Audio Monitor</h1>
            <div class="controls">
                <button id="startStop">Start</button>
                <span id="status" class="badge">Ready</span>
                <button id="uploadAudioButton" class="secondary-button">Analyze audio</button>
                <label class="control-inline">
                    <input type="checkbox" id="effectToggle" /> Processed
                </label>
                <label class="control-inline">
                    Cancellation intensity
                    <input type="range" id="mixSlider" min="0" max="1" step="0.01" value="0" />
                    <span id="modeLabel">0%</span>
                </label>
            </div>
        </header>

        <input id="audioFileInput" type="file" accept="audio/*" hidden />

        <section class="visuals">
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title-block">
                        <h2>Waveform</h2>
                    </div>
                    <p class="chart-legend" aria-label="Waveform legend">
                        <span class="legend-item"><span class="legend-swatch legend-swatch--cyan"></span>Captured
                            headphone signal</span>
                        <span class="legend-item"><span class="legend-swatch legend-swatch--purple"></span>Cancellation
                            wave</span>
                    </p>
                </div>
                <canvas id="waveform" width="800" height="220"></canvas>
            </div>
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title-block">
                        <h2>Spectrum</h2>
                    </div>
                </div>
                <canvas id="spectrum" width="800" height="220"></canvas>
            </div>
        </section>

        <div id="analysisOverlay" class="analysis-overlay" hidden>
            <div class="analysis-overlay__backdrop"></div>
            <div class="analysis-overlay__shell" role="dialog" aria-modal="true" aria-labelledby="analysisOverlayTitle">
                <div class="analysis-overlay__header">
                    <div class="analysis-overlay__heading-block">
                        <p class="analysis-eyebrow">Audio analysis</p>
                        <h2 id="analysisOverlayTitle">Processing audio</h2>
                        <p id="analysisOverlaySubtitle" class="analysis-overlay__subtitle">Upload result will appear
                            here.</p>
                    </div>
                    <div class="analysis-overlay__actions">
                        <button id="analysisDownload" class="secondary-button" disabled>
                            <span class="button-label">Download PNG</span>
                            <span class="button-spinner" aria-hidden="true"></span>
                        </button>
                        <button id="analysisClose" class="secondary-button">Close</button>
                    </div>
                </div>

                <section id="analysisLoadingState" class="analysis-overlay__state analysis-overlay__state--loading">
                    <div class="analysis-loading-card">
                        <span class="spinner spinner--large" aria-hidden="true"></span>
                        <p id="analysisOverlayMessage" class="analysis-overlay__message">Decoding the selected audio
                            file...</p>
                    </div>
                </section>

                <section id="analysisResultState" class="analysis-overlay__state analysis-overlay__state--result"
                    hidden>
                    <div class="analysis-overlay__figure-card">
                        <img id="analysisComparisonImage" alt="Comparison graph" />
                    </div>

                    <div id="analysisMetrics" class="analysis-metrics" aria-label="Analysis metrics"></div>

                    <div id="analysisDetailList" class="analysis-detail-list" aria-label="Supporting details"></div>
                </section>
            </div>
        </div>

        <footer class="note">Use headphones. Click Start and grant microphone permission when prompted.</footer>
    </main>

    <script src="node_modules/chart.js/dist/chart.umd.min.js"></script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
