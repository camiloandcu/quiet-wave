<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Real-time Audio Monitor</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <main class="container">
        <header>
            <h1>Real-time Audio Monitor</h1>
            <div class="controls">
                <button id="startStop">Start</button>
                <span id="status" class="badge">Ready</span>
                <label class="control-inline">
                    <input type="checkbox" id="effectToggle" /> Processed
                </label>
                <label class="control-inline">
                    Cancellation intensity
                    <input type="range" id="mixSlider" min="0" max="1" step="0.01" value="0" />
                    <span id="modeLabel">0%</span>
                </label>
            </div>
        </header>

        <section class="visuals">
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title-block">
                        <h2>Waveform</h2>
                    </div>
                    <p class="chart-legend" aria-label="Waveform legend">
                        <span class="legend-item"><span class="legend-swatch legend-swatch--cyan"></span>Captured
                            headphone signal</span>
                        <span class="legend-item"><span class="legend-swatch legend-swatch--purple"></span>Cancellation
                            wave</span>
                    </p>
                </div>
                <canvas id="waveform" width="800" height="220"></canvas>
            </div>
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title-block">
                        <h2>Spectrum</h2>
                    </div>
                </div>
                <canvas id="spectrum" width="800" height="220"></canvas>
            </div>
        </section>

        <footer class="note">Use headphones. Click Start and grant microphone permission when prompted.</footer>
    </main>

    <script type="module" src="src/main.js"></script>
</body>

</html>
